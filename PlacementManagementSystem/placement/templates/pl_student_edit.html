{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student Profile | Placebridge</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            height: 100vh;
            background: #F3F4F6;
        }
        .sidebar {
            width: 250px;
            background: #2A3F54;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .sidebar button {
            display: flex;
            align-items: center;
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            padding: 10px;
            text-align: left;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }
        .sidebar button:hover {
            background: #1E2B3A;
            border-radius: 5px;
        }
        .content {
            flex-grow: 1;
            padding: 30px;
        }
        .container {
            max-width: 800px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .form-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            font-weight: bold;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .btn {
            background: #2A3F54;
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 20px;
            width: 100%;
        }
        .btn:hover {
            background: #1E2B3A;
        }
        .sidebar img {
            width: 20px;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <button onclick="location.href='{% url 'placement_dashboard' %}'"><img src="{% static 'placement/hiring.png' %}" alt="New Placement"> New Placement</button>
        <button onclick="location.href='{% url 'pl_placement_details' %}'"><img src="{% static 'placement/details.png' %}" alt="Placement Details"> Placement Details</button>
        <button onclick="location.href='{% url 'pl_student_profile' %}'"><img src="{% static 'placement/student.png' %}" alt="Student Profile"> Student Profile</button>
        <button onclick="location.href='{% url 'pl_applied_students' %}'"><img src="{% static 'placement/appstu.png' %}" alt="Applied Students"> Applied Student Details</button>
        <button onclick="location.href='{% url 'pl_alumni' %}'"><img src="{% static 'placement/alumini.png' %}" alt="Alumni"> Alumni</button>
        <button class="logout-btn" onclick="confirmLogout()"><img src="{% static 'placement/logout.png' %}" alt="Log Out"> Log Out</button>
    </div>
    <div class="content">
        <div class="container">
            <h2>Edit Student Profile</h2>
            <form method="POST" action="{% url 'pl_edit_student' student.student_id %}" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="form-container">
                    <div class="form-group">
                        <label for="student_name">Name:</label>
                        <input type="text" name="student_name" value="{{ student.name }}" required>
                    </div>
                    <div class="form-group">
                        <label for="gender">Gender:</label>
                        <select name="gender" required>
                            <option value="Male" {% if student.Gender == "Male" %}selected{% endif %}>Male</option>
                            <option value="Female" {% if student.Gender == "Female" %}selected{% endif %}>Female</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="dob">Birth Date:</label>
                        <input type="date" name="dob" value="{{ student.Birth_date|date:'Y-m-d' }}" required>
                    </div>
                    <div class="form-group">
                        <label for="contact">Contact:</label>
                        <input type="text" name="contact" value="{{ student.contact }}" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" name="email" value="{{ student.email }}" required>
                    </div>
                    <div class="form-group">
                        <label for="branch">Branch:</label>
                        <input type="text" name="branch" value="{{ student.branch }}" required>
                    </div>
                    <div class="form-group">
                        <label for="sslc">SSLC %:</label>
                        <input type="text" name="sslc" value="{{ student.sslc_per }}" required>
                    </div>
                    <div class="form-group">
                        <label for="sslcyear">SSLC Passout:</label>
                        <input type="text" name="sslc_year" value="{{ student.passout_year_sslc }}" required>
                    </div>
                    <div class="form-group">
                        <label for="hsc">HSC %:</label>
                        <input type="text" name="hsc" value="{{ student.hsc_per }}" required>
                    </div>
                    <div class="form-group">
                        <label for="hscyear">HSC Passout:</label>
                        <input type="text" name="hsc_year" value="{{ student.passout_year_hsc }}" required>
                    </div>
                    <div class="form-group">
                        <label for="skill">Skills:</label>
                        <input type="text" name="skill" value="{{ student.skill }}" required>
                    </div>
                    <div class="form-group">
                        <label for="profile_pic">Profile Picture:</label>
                        <input type="file" name="profile_pic">
                    </div>
                    <div class="form-group">
                        <label for="resume">Resume:</label>
                        <input type="file" name="resume">
                    </div>
                </div>
                <button type="submit" class="btn">Update</button>
            </form>
        </div>
    </div>
    <script>
        function confirmLogout() {
            let confirmation = confirm("Are you sure you want to log out?");
            if (confirmation) {
                window.location.href = "{% url 'logout' %}";
            }
        }
    </script>
</body>
</html>
