{% load static %}

{% if error == "yes" %}
     <script>
	    alert('Passwords do not match');
     </script>
{% endif %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni Sign Up | Placebridge</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* General Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #1e3c72, #2a5298, #5c258d, #4389a2);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Sign Up Container */
        .signup-container {
            width: 350px;
            background: rgba(255, 255, 255, 0.15);
            padding: 30px;
            backdrop-filter: blur(15px);
            border-radius: 15px;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.4);
            text-align: center;
            color: white;
            margin-top: 50px;
        }

        .signup-container h2 {
            font-weight: 700;
            margin-bottom: 20px;
        }

        /* Input Fields */
        .input-group {
            margin: 15px 0;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.3);
            padding: 12px;
            border-radius: 8px;
        }

        .input-group img {
            width: 24px;
            height: 24px;
            margin-right: 10px;
        }

        .input-group input {
            border: none;
            outline: none;
            background: none;
            width: 100%;
            font-size: 16px;
            color: white;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        /* Error Message */
        .error-message {
            color: #ff4d4d;
            font-size: 14px;
            margin-top: -10px;
            display: none;
        }

        /* Buttons */
        .button, .signup-btn {
            background-color: #32cd32;
            color: black;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: 0.3s ease-in-out;
            width: 100%;
            margin-top: 10px;
        }

        .button:hover, .signup-btn:hover {
            background: white;
            color: black;
            box-shadow: 0px 3px 10px rgba(255, 255, 255, 0.3);
        }

        .back-to-login {
            background: none;
            border: none;
            color: white;
            font-size: 14px;
            text-decoration: underline;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
    <script>
        function validateForm(event) {
            let alumniId = document.getElementById('alumniId').value.trim();
            let password = document.getElementById('password').value;
            let confirmPassword = document.getElementById('confirmPassword').value;
            let passwordError = document.getElementById('passwordError');
            let confirmPasswordError = document.getElementById('confirmPasswordError');

            let passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
            let isValid = true;

            // Clear previous errors
            passwordError.style.display = "none";
            confirmPasswordError.style.display = "none";

            // Password Validation
            if (!passwordPattern.test(password)) {
                passwordError.style.display = "block";
                passwordError.textContent = "Password must be at least 8 characters long, include uppercase, lowercase, a number, and a special character.";
                isValid = false;
            }

            // Confirm Password Validation
            if (password !== confirmPassword) {
                confirmPasswordError.style.display = "block";
                confirmPasswordError.textContent = "Passwords do not match.";
                isValid = false;
            }

            // Prevent form submission if validation fails
            if (!isValid) {
                event.preventDefault();
            } else {
                alert("Account Created Successfully!");
            }
        }
    </script>
</head>
<body>
    <!-- Sign Up Form -->
    <div class="signup-container">
        <h2>Alumni Sign Up</h2>
        <form action="{% url 'alumni_signup' %}" method="POST" onsubmit="validateForm(event)">
            {% csrf_token %}
            <div class="input-group">
                <img src="{% static 'placement/alumini.png' %}" alt="Alumni ID Icon">
                <input type="text" id="alumniId" name="alumniId" placeholder="Alumni ID" required>
            </div>

            <div class="input-group">
                <img src="{% static 'placement/key.png' %}" alt="Key Icon">
                <input type="password" id="password" name="password" placeholder="Password" required>
            </div>
            <p class="error-message" id="passwordError"></p>

            <div class="input-group">
                <img src="{% static 'placement/key.png' %}" alt="Confirm Key Icon">
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required>
            </div>
            <p class="error-message" id="confirmPasswordError"></p>

            <!-- Sign Up Button -->
            <button type="submit" class="signup-btn">Sign Up</button>
            <button class="back-to-login" onclick="location.href='{% url "alumni_login" %}'">Back to Login</button>
        </form>
    </div>
</body>
</html>
