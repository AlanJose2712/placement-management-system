{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni Profile | Placebridge</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            height: 100vh;
            background: #F3F4F6;
        }
        .sidebar {
            width: 250px;
            background: #2A3F54;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .sidebar button {
            display: flex;
            align-items: center;
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            padding: 10px;
            text-align: left;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }
        .sidebar button:hover {
            background: #1E2B3A;
            border-radius: 5px;
        }
        .sidebar button img {
            width: 20px;
            height: 20px;
            margin-right: 12px;
        }
        .logout-btn {
            margin-top: auto;
            background: #D9534F;
        }
        .logout-btn:hover {
            background: #C9302C;
        }
        .content {
            flex-grow: 1;
            background: #FFFFFF;
            padding: 30px;
            border-radius: 10px;
            margin: 20px;
        }
        .content h2 {
            margin-bottom: 20px;
        }
        .form-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .form-group input,select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .submit-btn {
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
            margin-top: 10px;
        }
        .submit-btn:hover {
            background: #218838;
        }
    </style>
    <script>
        function confirmLogout() {
            let confirmation = confirm("Are you sure you want to log out?");
            if (confirmation) {
                window.location.href = "{% url 'logout' %}"; 
            }
        }
    </script>
</head>
<body>
    <div class="sidebar">
        <button onclick="location.href='{% url 'alumni_dashboard' %}'"><img src="{% static 'placement/uprofile.png' %}" alt="Alumni Profile">Alumni Profile</button>
        <button onclick="location.href='{% url 'al_student_profile' %}'"><img src="{% static 'placement/student.png' %}" alt="Student Profile">Student Profile</button>
        <button onclick="location.href='{% url 'alapplied_students' %}'"><img src="{% static 'placement/appstu.png' %}" alt="Applied Students">Applied Students</button>
        <button class="logout-btn"  onclick="confirmLogout()"><img src="{% static 'placement/logout.png' %}" alt="Log Out"> Log Out</button>
    </div>
    {% block content %}
    <div class="content">
        <h2>Alumni Profile</h2>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-container">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" value="{{ alumni.name }}" required>
                </div>
                <div class="form-group">
                    <label for="company">Company Name</label>
                    <select id="company" name="company" required>
                        {% for company in companies %}
                        <option value="{{ company.company_id }}" {% if company.company_id == alumni.company_id %} selected {% endif %}>
                            {{ company.company_name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="position">Current Position</label>
                    <input type="text" id="position" name="position" value="{{ alumni.position }}" required>
                </div>
                <div class="form-group">
                    <label for="previous">Previous Status (Optional)</label>
                    <input type="text" id="previous" name="previous" value="{{ alumni.previous_status }}">
                </div>
                <div class="form-group">
                    <label for="contact">Contact Number</label>
                    <input type="text" id="contact" name="contact" pattern="[0-9]{10}" maxlength="10" value="{{ alumni.contact }}" required>
                </div>
                <div class="form-group">
                    <label for="email">E-Mail ID</label>
                    <input type="email" id="email" name="email" value="{{ alumni.email }}" required>
                </div>
                <div class="form-group">
                    <label for="linkedin">LinkedIn Profile</label>
                    <input type="text" id="linkedin" name="linkedin" value="{{ alumni.linkedin }}" required>
                </div>
                <div class="form-group">
                    <label for="branch">Branch</label>
                    <input type="text" id="branch" name="branch" value="{{ alumni.branch }}" required>
                </div>
                <div class="form-group">
                    <label for="passout">Year of Passout</label>
                    <input type="text" id="passout" name="passout" value="{{ alumni.passout_year }}" required>
                </div>
                <div class="form-group">
                    <label for="profile">Profile Picture</label>
                    <input type="file" id="profile" name="profile" accept="image/*">
                </div>
            </div>
            <button type="submit" class="submit-btn">Submit</button>
        </form>
    </div>
    {% endblock %}
</body>
</html>
