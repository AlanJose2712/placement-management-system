{% load static %}

{% if error == "yes" %}
     <script>
	    alert('Invalid Student ID');
     </script>
{% endif %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Signup | Placebridge</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #1e3c72, #2a5298, #5c258d, #4389a2);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .signup-container {
            width: 400px;
            background: rgba(255, 255, 255, 0.15);
            padding: 30px;
            backdrop-filter: blur(15px);
            border-radius: 15px;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.4);
            text-align: center;
            color: white;
        }
        .signup-container h2 {
            font-weight: 700;
            margin-bottom: 20px;
        }
        .input-group {
            margin: 12px 0;
            display: flex;
            flex-direction: column;
            text-align: left;
        }
        .input-group label {
            font-size: 14px;
            margin-bottom: 5px;
        }
        .input-group input {
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.3);
            color: white;
            outline: none;
        }
        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
        .error {
            color: red;
            font-size: 12px;
            margin-top: 5px;
        }
        .signup-btn {
            background-color: #ffcc00;
            color: black;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: 0.3s ease-in-out;
            width: 100%;
            margin-top: 10px;
        }
        .signup-btn:hover {
            background: white;
            color: black;
            box-shadow: 0px 3px 10px rgba(255, 255, 255, 0.3);
        }
        .back-btn {
            background: transparent;
            color: white;
            text-decoration: underline;
            border: none;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <h2>Student Signup</h2>
        <form action="{% url 'student_forgot' %}" method="POST">
            {% csrf_token %}
            <div class="input-group">
                <label>Student ID</label>
                <input type="text" id="student-id" name="student_id" placeholder="Enter Student ID" required>
            </div>
            <button type="submit" class="signup-btn">Forgot Password</button>
            <button type="button" class="back-btn" onclick="location.href='{% url "student_login" %}'">Back to Login</button>
        </form>
    </div>
</body>
</html>
