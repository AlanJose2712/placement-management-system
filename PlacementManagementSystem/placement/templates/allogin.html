{% load static %}
{% if error == "no" %}
     <script>
	   alert('Logged In Successfully');
       window.location=("{% url 'alumni_dashboard' %}");
     </script>
{% endif %}

{% if error == "yes" %}
     <script>
	    alert('Something went wrong, Try Again');
     </script>
{% endif %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni Login | Placebridge</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* General Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #1e3c72, #2a5298, #5c258d, #4389a2);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        /* Navbar */
        .navbar {
            position: absolute;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 30px;
            display: flex;
            align-items: center;
        }
        .navbar .brand { font-weight: 700; font-size: 24px; color: #32cd32; margin-right: 20px; }
        .navbar button {
            background: none; border: none; color: white; font-size: 18px;
            cursor: pointer; padding: 8px 15px; transition: 0.3s;
        }
        .navbar button:hover { background: #32cd32; color: #000; border-radius: 5px; }
        /* Login Container */
        .login-container {
            width: 350px; background: rgba(255, 255, 255, 0.15);
            padding: 30px; backdrop-filter: blur(15px); border-radius: 15px;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.4);
            text-align: center; color: white;
            margin-top: 80px;
        }
        .input-group {
            margin: 15px 0; display: flex; align-items: center;
            background: rgba(255, 255, 255, 0.3); padding: 12px; border-radius: 8px;
        }
        .input-group input {
            border: none; outline: none; background: none;
            width: 100%; font-size: 16px; color: white;
        }
        .input-group input::placeholder { color: rgba(255, 255, 255, 0.7); }
        .error-message {
            color: #ff4d4d; font-size: 14px;
            margin-top: -10px;
        }
        .button {
            background-color: #32cd32; color: black; border: none;
            padding: 12px 20px; border-radius: 8px; cursor: pointer;
            font-size: 16px; font-weight: 600; transition: 0.3s;
            width: 100%; margin-top: 10px;
        }
        .button:hover { background: white; color: black; box-shadow: 0px 3px 10px rgba(255, 255, 255, 0.3); }
        .signup-button {
            background: #ffcc00; border: none; color: black;
            padding: 12px 20px; border-radius: 8px; cursor: pointer;
            font-size: 16px; font-weight: 600; transition: 0.3s;
            width: 100%; margin-top: 10px;
        }
        .signup-button:hover { background: #e6b800; color: black; }
    </style>
</head>
<body>
    <div class="navbar">
        <span class="brand">Placebridge</span>
        <button onclick="location.href='{% url 'homepage' %}'">Home</button>
        <button onclick="location.href='{% url 'placement_login' %}'">Placement</button>
        <button onclick="location.href='{% url 'student_login' %}'">Student</button>
        <button onclick="location.href='{% url 'alumni_login' %}'">Alumni</button>
    </div>
    <div class="login-container">
        <h2>Alumni Login</h2>
        {% if messages %}
            {% for message in messages %}
                <p class="error-message">{{ message }}</p>
            {% endfor %}
        {% endif %}
        <form action="{% url 'alumni_login' %}" method="POST">
            {% csrf_token %}
            <div class="input-group">
                <input type="text" name="alumniId" placeholder="Alumni ID" required>
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit" class="button">Login</button>
        </form>
        <button class="signup-button" onclick="location.href='{% url 'alumni_signup' %}'">Sign Up</button>
    </div>
</body>
</html>
