<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home | Placebridge</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    /* Reset and Basic Styling */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(-45deg, #1e3c72, #2a5298, #5c258d, #4389a2);
      background-size: 400% 400%;
      animation: gradientBG 10s ease infinite;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      position: relative;
    }
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    /* Navbar */
    .navbar {
      position: absolute;
      top: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.6);
      padding: 15px 30px;
      display: flex;
      align-items: center;
    }
    .navbar .brand {
      font-weight: 700;
      font-size: 24px;
      color: #32cd32;
      margin-right: 20px;
    }
    .navbar button {
      background: none;
      border: none;
      color: white;
      font-size: 18px;
      cursor: pointer;
      padding: 8px 15px;
      transition: 0.3s ease-in-out;
    }
    .navbar button:hover {
      background: #32cd32;
      color: #000;
      border-radius: 5px;
    }
    /* Content */
    .container {
      margin-top: 80px; /* Ensures content is below navbar */
      padding: 20px;
    }
    h1 {
      font-size: 3em;
      margin-bottom: 20px;
    }
    p {
      font-size: 1.2em;
      margin-bottom: 10px;
    }
    /* Placement Officer Details */
    .placement-officer {
      position: absolute;
      bottom: 15px;
      left: 15px;
      text-align: left;
      font-size: 12px; /* Reduced font size */
      line-height: 1.2; /* Reduced gap between lines */
      color: white;
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <div class="navbar">
    <span class="brand">Placebridge</span>
    <button onclick="location.href='/'">Home</button>
    <a href="{% url 'placement_login' %}"><button>Placement</button></a>
    <a href="{% url 'student_login' %}"><button>Student</button></a>
    <a href="{% url 'alumni_login' %}"><button>Alumni</button></a>

  </div>

  <!-- Welcome Content -->
  <div class="container">
    <h1>Welcome to Placebridge</h1>
    <p>Empowering Your Future with Unmatched Placement Success</p>
    <p>Connecting Talent with Opportunity</p>
    <p>Your Gateway to Top Industry Careers</p>
  </div>

  <!-- Placement Officer Contact Details -->
  <div class="placement-officer">
    <p><strong>PLACEMENT OFFICER</strong></p>
    <p>9999999999</p>
    <p>POOFFICER@gmail.com</p>
  </div>

</body>
</html>
